<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>机构管理后台 - 登录</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../shared/style.css">
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      background: #f5f7fa;
    }
    .login-left {
      flex: 1;
      background: linear-gradient(135deg, #003a70 0%, #1677ff 60%, #4096ff 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 40px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .login-left::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      top: -150px;
      right: -100px;
    }
    .login-left::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,0.02);
      bottom: -100px;
      left: -80px;
    }
    .login-left .brand {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .login-left .brand .brand-icon {
      width: 80px;
      height: 80px;
      background: rgb(255, 255, 255);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
      backdrop-filter: blur(10px);
    }
    .login-left .brand h1 {
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .login-left .brand p {
      font-size: 16px;
      opacity: 0.7;
      max-width: 360px;
      line-height: 1.6;
    }
    .login-left .features {
      position: relative;
      z-index: 1;
      margin-top: 60px;
      display: flex;
      gap: 32px;
    }
    .login-left .feature-item {
      text-align: center;
    }
    .login-left .feature-item i {
      font-size: 24px;
      margin-bottom: 8px;
      opacity: 0.8;
    }
    .login-left .feature-item span {
      display: block;
      font-size: 13px;
      opacity: 0.6;
    }
    .login-right {
      width: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: #fff;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
    }
    .login-card .login-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-card .login-header .logo-badge {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #1677ff, #4096ff);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 26px;
      color: #fff;
      box-shadow: 0 4px 12px rgba(22,119,255,0.3);
    }
    .login-card .login-header .sub-title {
      font-size: 12px;
      color: #bbb;
      margin-top: 2px;
    }
    .login-card .login-header h2 {
      font-size: 20px;
      color: #222;
      font-weight: 600;
    }
    .login-card .login-header p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }
    .login-card .form-group {
      margin-bottom: 20px;
    }
    .login-card .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #333;
      margin-bottom: 6px;
    }
    .login-card .form-group .input-wrap {
      position: relative;
    }
    .login-card .form-group .input-wrap > i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #bbb;
      font-size: 16px;
    }
    .login-card .form-group .input-wrap input {
      width: 100%;
      height: 44px;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 0 46px 0 40px;
      font-size: 14px;
      color: #333;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .login-card .form-group .input-wrap .toggle-pwd {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      outline: none;
      cursor: pointer;
      color: #bbb;
      font-size: 16px;
      padding: 0;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .login-card .form-group .input-wrap .toggle-pwd:hover {
      color: #1677ff;
    }
    .login-card .form-group .input-wrap input:focus {
      border-color: #1677ff;
      box-shadow: 0 0 0 3px rgba(22,119,255,0.08);
    }
    .login-card .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .login-card .form-options label {
      font-size: 13px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .login-card .btn-login {
      width: 100%;
      height: 44px;
      background: linear-gradient(135deg, #1677ff, #4096ff);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(22,119,255,0.3);
    }
    .login-card .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(22,119,255,0.4);
    }
    .login-card .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #bbb;
    }
    .login-card .school-info {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .login-card .school-info i {
      font-size: 20px;
      color: #1677ff;
    }
    .login-card .school-info div {
      font-size: 13px;
      color: #555;
    }
    .login-card .school-info div strong {
      color: #222;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <!-- 左侧品牌区 -->
    <div class="login-left">
      <div class="brand">
        <div class="brand-icon">
          <img src="../image/logo.png" alt="Logo" style="width: 50px; height: 50px; object-fit: contain;" />
        </div>
        <h1>翰闻数据标注实训管理后台</h1>
        <!-- <p>学校/机构管理后台 · 教学管理中枢</p> -->
      </div>
      <div class="features">
        <div class="feature-item">
          <i class="fa-solid fa-pen-to-square"></i>
          <span>考试管理</span>
        </div>
        <div class="feature-item">
          <i class="fa-solid fa-user-plus"></i>
          <span>考生导入</span>
        </div>
        <!-- <div class="feature-item">
          <i class="fa-solid fa-chart-simple"></i>
          <span>数据分析</span>
        </div> -->
        <div class="feature-item">
          <i class="fa-solid fa-file-export"></i>
          <span>结果导出</span>
        </div>
      </div>
    </div>

    <!-- 右侧登录卡片 -->
    <div class="login-right">
      <div class="login-card">
        <div class="login-header">
          <div class="logo-badge">
            <i class="fa-solid fa-graduation-cap"></i>
          </div>
          <h2>学校/机构管理后台</h2>
          <!-- <p>请使用学校管理员账号登录</p>
          <div class="sub-title">华南理工大学 · 教务端口</div> -->
        </div>

        <!-- <div class="school-info">
          <i class="fa-solid fa-building-columns"></i>
          <div>登录学校：<strong>华南理工大学</strong><br><span style="font-size:11px;color:#aaa;">有效期至 2026-06-12</span></div>
        </div> -->

        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>账号</label>
            <div class="input-wrap">
              <i class="fa-regular fa-user"></i>
              <input type="text" placeholder="请输入学校管理员账号" value="admin_scut">
            </div>
          </div>
          <div class="form-group">
            <label>密码</label>
            <div class="input-wrap">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="passwordInput" placeholder="请输入密码" value="123456">
              <button type="button" class="toggle-pwd" onclick="togglePassword()">
                <i class="fa-regular fa-eye" id="pwdToggleIcon"></i>
              </button>
            </div>
          </div>
          <div class="form-options">
            <label>
              <input type="checkbox" checked> 记住密码
            </label>
            <!-- <a href="#" style="font-size:13px;color:#1677ff;text-decoration:none;">忘记密码？</a> -->
          </div>
          <button type="submit" class="btn-login">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
            登 录
          </button>
        </form>

        <div class="login-footer">
          © 2026 翰闻人工智能考评管理后台
        </div>
      </div>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      // 模拟登录并校验有效期
      const now = new Date();
      const expire = new Date('2027-06-12');
      if (now > expire) {
        alert('⛔ 您机构的账号已过期，请联系平台续费');
      } else {
        window.location.href = 'dashboard.html';
      }
    }

    function togglePassword() {
      const input = document.getElementById('passwordInput');
      const icon = document.getElementById('pwdToggleIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-regular fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fa-regular fa-eye';
      }
    }
  </script>
<script>
  const REQUIREMENT_TEXT = `机构管理后台 - 登录页

  需求说明：
  1、登录校验：账号是否存在、密码是否正确。若到期，可以登录系统，但无法进行考试计划创建、发布、编辑、办结等操作；
  `;
</script>
<script src="../shared/requirement.js"></script>
</body>
</html>
