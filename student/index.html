<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考生端 - 翰闻数据标注实训平台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../shared/style.css">
  <style>
    .student-bg {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f5ff 0%, #e6f4ff 50%, #f5f7fa 100%);
    }
    .hero-section {
      background: linear-gradient(135deg, #001529 0%, #003a70 50%, #1677ff 100%);
      padding: 40px 0;
      text-align: center;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .hero-section::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      top: -120px;
      right: -80px;
    }
    .hero-section .hero-inner {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }
    .hero-section .hero-icon {
      width: 64px;
      height: 64px;
      background: rgba(255,255,255,0.12);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
      backdrop-filter: blur(10px);
    }
    .hero-section h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .hero-section p {
      font-size: 14px;
      opacity: 0.7;
    }
    .login-container {
      max-width: 440px;
      margin: -40px auto 0;
      padding: 0 16px;
      position: relative;
      z-index: 2;
    }
    .login-card-student {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 36px;
    }
    .login-card-student .login-title {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-card-student .login-title h2 {
      font-size: 18px;
      color: #222;
      font-weight: 600;
    }
    .login-card-student .login-title p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }
    .login-card-student .form-group {
      margin-bottom: 20px;
    }
    .login-card-student .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #333;
      margin-bottom: 6px;
    }
    .login-card-student .input-wrap {
      position: relative;
    }
    .login-card-student .input-wrap > i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #bbb;
      font-size: 16px;
    }
    .login-card-student .input-wrap input {
      width: 100%;
      height: 46px;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 0 46px 0 42px;
      font-size: 14px;
      color: #333;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .login-card-student .input-wrap .toggle-pwd {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      outline: none;
      cursor: pointer;
      color: #bbb;
      font-size: 16px;
      padding: 0;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .login-card-student .input-wrap .toggle-pwd:hover {
      color: #1677ff;
    }
    .login-card-student .input-wrap input:focus {
      border-color: #1677ff;
      box-shadow: 0 0 0 3px rgba(22,119,255,0.08);
    }
    .login-card-student .btn-login {
      width: 100%;
      height: 46px;
      background: linear-gradient(135deg, #1677ff, #4096ff);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(22,119,255,0.25);
    }
    .login-card-student .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(22,119,255,0.35);
    }
    .login-card-student .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #bbb;
    }
    .login-card-student .exam-notice {
      background: #fff7e6;
      border: 1px solid #ffd591;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .login-card-student .exam-notice i {
      color: #fa8c16;
      margin-top: 2px;
    }
    .login-card-student .exam-notice div {
      font-size: 12px;
      color: #d46b08;
    }
    /* 登录成功中间页 */
    .success-container {
      max-width: 560px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .success-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px;
      text-align: center;
    }
    .success-card .success-icon {
      font-size: 56px;
      color: #52c41a;
      margin-bottom: 16px;
    }
    .success-card h2 {
      font-size: 22px;
      color: #222;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .success-card .exam-info {
      background: #f9f9f9;
      border-radius: 10px;
      padding: 20px;
      margin: 24px 0;
      text-align: left;
    }
    .success-card .exam-info .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }
    .success-card .exam-info .info-row:last-child {
      border-bottom: none;
    }
    .success-card .exam-info .info-row .label {
      color: #888;
    }
    .success-card .exam-info .info-row .value {
      color: #333;
      font-weight: 500;
    }
    .countdown {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 24px 0;
    }
    .countdown .count-item {
      text-align: center;
    }
    .countdown .count-item .num {
      width: 52px;
      height: 52px;
      background: #001529;
      color: #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
    }
    .countdown .count-item .label {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }
    .countdown .separator {
      font-size: 28px;
      color: #333;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .success-card .btn-enter {
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, #1677ff, #4096ff);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(22,119,255,0.25);
      margin-top: 8px;
    }
    .success-card .btn-enter:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(22,119,255,0.35);
    }
    .modal-content-wrapper {
      display: none;
    }
    .modal-content-wrapper.show {
      display: block;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
<div class="student-bg">
  <!-- 顶部品牌栏 -->
  <div class="portal-topbar">
    <div class="brand">
      <div class="brand-icon">
        <!-- <i class="fa-solid fa-robot"></i> -->
        <img src="../image/logo.png" alt="Logo" style="width: 40px; height: auto;" />
      </div>
      <span>翰闻数据标注实训平台</span>
    </div>
    <!-- <div class="text-sm text-muted">
      <i class="fa-regular fa-circle-question mr-1"></i>
      <a href="#" style="color:#888;">帮助中心</a>
    </div> -->
  </div>

  <!-- 登录���（默认显示） -->
  <div id="loginView">
    <div class="hero-section">
      <div class="hero-inner">
        <div class="hero-icon">
          <i class="fa-solid fa-graduation-cap"></i>
        </div>
        <h1>欢迎参加人工智能训练师实操考试</h1>
      </div>
    </div>

    <div class="login-container">
      <div class="login-card-student">
        <div class="login-title">
          <h2>考生登录</h2>
          <p>请输入您的身份证号和密码进行登录</p>
        </div>

        <!-- <div class="exam-notice">
          <i class="fa-solid fa-circle-info"></i>
          <div>您目前有 <strong>1</strong> 场待参加的考试：<strong>「2026年第一期标注师认证」</strong>，将于 2026-06-10 09:00 开始。</div>
        </div> -->

        <form onsubmit="handleStudentLogin(event)">
          <div class="form-group">
            <label>身份证号</label>
            <div class="input-wrap">
              <i class="fa-regular fa-id-card"></i>
              <input type="text" id="studentId" placeholder="请输入身份证号码" value="440106199801011234">
            </div>
          </div>
          <div class="form-group">
            <label>密码</label>
            <div class="input-wrap">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="studentPwd" placeholder="请输入密码（后6位）" value="011234">
              <button type="button" class="toggle-pwd" onclick="togglePwd()">
                <i class="fa-regular fa-eye" id="pwdIcon"></i>
              </button>
            </div>
            <div class="help-text" style="margin-top:4px;">初始密码为身份证号后6位（X请大写）</div>
          </div>
          <button type="submit" class="btn-login">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
            登 录
          </button>
        </form>

        <div class="login-footer">
          © 2026 翰闻人工智能考评管理后台
        </div>
      </div>
    </div>
  </div>

  <!-- 登录成功中间页（登录后切换显示） -->
  <div id="successView" class="hidden">
    <div class="success-container">
      <div class="success-card">
        <div class="success-icon">
          <i class="fa-solid fa-circle-check"></i>
        </div>
        <h2>登录成功！</h2>
        <p style="color:#888;font-size:14px;">欢迎 <strong id="studentNameDisplay" style="color:#222;">张三</strong> 同学</p>

        <div class="exam-info">
          <div class="info-row">
            <span class="label">考试计划</span>
            <span class="value">2026年第一期标注师认证</span>
          </div>
          <div class="info-row">
            <span class="label">考试时间</span>
            <span class="value">2026-06-10 09:00 ~ 12:00</span>
          </div>
          <div class="info-row">
            <span class="label">考试时长</span>
            <span class="value">90 分钟</span>
          </div>
          <div class="info-row">
            <span class="label">所属学校</span>
            <span class="value">华南理工大学</span>
          </div>
          <div class="info-row">
            <span class="label">登录IP</span>
            <span class="value" id="userIp">192.168.1.100</span>
          </div>
        </div>

        <div style="background:#e6f4ff;border-radius:8px;padding:12px;margin-bottom:16px;">
          <p style="font-size:13px;color:#1677ff;">
            <i class="fa-solid fa-circle-check mr-1"></i>
            系统已自动上报您的登录信息，即将跳转至考试系统...
          </p>
        </div>

        <div class="countdown">
          <div class="count-item">
            <div class="num" id="countdownSec" style="background:#1677ff;">5</div>
            <div class="label">秒</div>
          </div>
        </div>

        <button class="btn-enter" onclick="enterExam()">
          <i class="fa-solid fa-arrow-right"></i>
          立即进入考试系统
        </button>

        <div style="margin-top:16px;padding-top:16px;border-top:1px solid #f0f0f0;">
          <p style="font-size:12px;color:#aaa;">
            <i class="fa-regular fa-clock mr-1"></i>
            登录时间已记录：<span id="loginTime">2026-06-09 10:00:00</span>
            <br>
            交卷后请返回本系统查看结果
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function handleStudentLogin(e) {
    e.preventDefault();
    const studentId = document.getElementById('studentId').value;
    const password = document.getElementById('studentPwd').value;

    // 简单校验
    if (!studentId || !password) {
      alert('❌ 请输入身份证号和密码');
      return;
    }

    // 模拟校验（实际项目中会请求API）
    // 校验身份证后6位
    const expectedPwd = studentId.slice(-6).toUpperCase();
    if (password.toUpperCase() !== expectedPwd) {
      alert('❌ 身份证号或密码不正确');
      return;
    }

    // 模拟有效期校验
    const now = new Date();
    const examStart = new Date('2026-06-10T09:00:00');
    const examEnd = new Date('2030-06-10T12:00:00');
    const schoolExpire = new Date('2027-06-12');

    if (now > schoolExpire) {
      alert('⛔ 当前无法登录，请联系学校管理员');
      return;
    }

    if (now > examEnd) {
      alert('⛔ 当前考试已结束');
      return;
    }

    // 登录成功，携带 Token 直接跳转至考试页面
    const studentName = '张三';
    const token = 'exam_token_abc123xyz';
    const userId = studentId;
    window.location.href = 'exam.html?token=' + encodeURIComponent(token) + '&userId=' + encodeURIComponent(userId) + '&name=' + encodeURIComponent(studentName);
  }

  let countdownTimer;
  function startCountdown() {
    let sec = 5;
    const el = document.getElementById('countdownSec');
    countdownTimer = setInterval(() => {
      sec--;
      el.textContent = sec;
      if (sec <= 0) {
        clearInterval(countdownTimer);
        enterExam();
      }
    }, 1000);
  }

  function enterExam() {
    clearInterval(countdownTimer);
    alert('🔗 即将跳转至开源考试系统\n\n携带Token: exam_token_abc123xyz\n用户ID: 440106199801011234\n\n（实际开发中将重定向至开源系统URL）');
    // window.location.href = 'https://exam.open-source-system.com?token=xxx&userId=xxx';
  }

  // 身份证号自动填充密码
  document.getElementById('studentId').addEventListener('input', function() {
    const val = this.value.trim();
    if (val.length >= 6) {
      const pwdInput = document.getElementById('studentPwd');
      if (pwdInput.value === '' || pwdInput.dataset.auto === 'true') {
        pwdInput.value = val.slice(-6).toUpperCase();
        pwdInput.dataset.auto = 'true';
      }
    }
  });

  function togglePwd() {
    const input = document.getElementById('studentPwd');
    const icon = document.getElementById('pwdIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'fa-regular fa-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'fa-regular fa-eye';
    }
  }
</script>
<script>
  const REQUIREMENT_TEXT = `考生端 - 登录页

需求说明：
1、登录时校验：是否在考试时间段内、账号密码是否正确、计划所属学校/机构账号是否过期。
`;
</script>
<script src="../shared/requirement.js"></script>
</body>
</html>
